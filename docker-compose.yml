services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/app/data/prod.db
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      CLIENT_URL: http://localhost
    volumes:
      - db-data:/app/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
